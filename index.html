<!DOCTYPE html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Venturo" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <!-- OG fallback for social crawlers -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Venturo" />
    <meta property="og:url" content="https://venturoconsulting.it" />
    <meta property="og:title" content="Venturo — Cultura organizzativa ed employer branding" />
    <meta property="og:description" content="Consulenza in cultura organizzativa ed employer branding per organizzazioni che vogliono essere riconoscibili." />
    <meta property="og:image" content="https://venturoconsulting.it/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Venturo — Cultura organizzativa ed employer branding" />
    <meta name="twitter:description" content="Consulenza in cultura organizzativa ed employer branding per organizzazioni che vogliono essere riconoscibili." />
    <meta name="twitter:image" content="https://venturoconsulting.it/og-image.png" />
    <!-- Critical inline CSS for above-the-fold content (breaks JS→CSS chain) -->
    <style>
      *,*::before,*::after{box-sizing:border-box;margin:0}
      :root{--background:0 0% 100%;--foreground:0 0% 8%;--border:0 0% 88%;--muted-foreground:0 0% 45%}
      body{background:hsl(var(--background));color:hsl(var(--foreground));font-family:'Space Grotesk',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
      h1,h2,h3,h4,h5,h6{font-family:'Space Grotesk',system-ui,sans-serif}
      #root{min-height:100vh}
      .min-h-screen{min-height:100vh}
      .bg-background{background-color:hsl(var(--background))}
      .text-foreground{color:hsl(var(--foreground))}
      .fixed{position:fixed}.top-0{top:0}.left-0{left:0}.right-0{right:0}
      .z-50{z-index:50}.flex{display:flex}.items-center{align-items:center}
      .justify-between{justify-content:space-between}
      .relative{position:relative}.overflow-x-hidden{overflow-x:hidden}
      .container-wide{max-width:80rem;margin:0 auto;padding-left:1.25rem;padding-right:1.25rem}
      @media(min-width:768px){.container-wide{padding-left:2rem;padding-right:2rem}}
      .h-16{height:4rem}.border-b{border-bottom-width:1px;border-color:hsl(var(--border)/0.5)}
      .backdrop-blur-md{backdrop-filter:blur(12px)}
      .pt-20{padding-top:5rem}
    </style>
    <!-- Preload LCP image (logo) to eliminate resource load delay -->
    <link rel="preload" href="/src/assets/logo-venturo.webp" as="image" type="image/webp" fetchpriority="high">
    <!-- Preload critical CSS to break JS→CSS chain -->
    <link rel="preload" href="/src/index.css" as="style">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
    <!-- Google tag (gtag.js) — deferred after page load -->
    <script>
      window.addEventListener('load', function() {
        setTimeout(function() {
          var s = document.createElement('script');
          s.src = 'https://www.googletagmanager.com/gtag/js?id=G-CD6ND91DPX';
          s.async = true;
          document.head.appendChild(s);
          s.onload = function() {
            window.dataLayer = window.dataLayer || [];
            function gtag(){dataLayer.push(arguments);}
            window.gtag = gtag;
            gtag('js', new Date());
            gtag('config', 'G-CD6ND91DPX');
          };
        }, 2000);
      });
    </script>
  </head>
  <body>
    <div id="root">
      <!-- SSR-like shell: render LCP element immediately to eliminate render delay -->
      <div style="position:fixed;top:0;left:0;right:0;z-index:50;height:4rem;display:flex;align-items:center;background:hsla(0,0%,100%,.8);backdrop-filter:blur(12px);border-bottom:1px solid hsla(0,0%,88%,.5)" id="shell-header">
        <div style="max-width:80rem;margin:0 auto;padding:0 1.25rem;width:100%">
          <img src="/src/assets/logo-venturo.webp" alt="Venturo - consulenza cultura organizzativa ed employer branding" width="120" height="32" style="height:1.5rem;width:auto;object-fit:contain" fetchpriority="high">
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
